syntax = "proto3";
option java_multiple_files = true;
option java_package = "com.ocean.afefe.entities.proto";
option java_outer_classname = "CourseProto";
import "google/protobuf/struct.proto";
import "Common.proto";

service CourseMgtServiceGrpc {
    rpc CreateCourse(CreateCourseRequest) returns (CreateCourseResponse);
    rpc UpdateCourse(UpdateInstructorCourseRequest) returns (UpdateInstructorCourseResponse);
    rpc DeleteCourse(DeleteCourseRequest) returns (DeleteCourseResponse);
    rpc PublishCourse(PublishCourseRequest) returns (PublishCourseResponse);
    rpc CreateModule(CreateModuleRequest) returns (CreateModuleResponse);
    rpc UpdateModule(UpdateModuleRequest) returns (UpdateModuleResponse);
    rpc DeleteModule(DeleteModuleRequest) returns (DeleteModuleResponse);
    rpc CreateLesson(CreateLessonRequest) returns (CreateLessonResponse);
    rpc UpdateLesson(UpdateLessonRequest) returns (UpdateLessonResponse);
    rpc DeleteLesson(DeleteLessonRequest) returns (DeleteLessonResponse);
    rpc CreateLessonContent(CreateLessonContentRequest) returns (CreateLessonContentResponse);
    rpc UpdateLessonContent(UpdateLessonContentRequest) returns (UpdateLessonContentResponse);
    rpc DeleteLessonContent(DeleteLessonContentRequest) returns (DeleteLessonContentResponse);
    rpc CreateLessonAsset(CreateLessonAssetRequest) returns (CreateLessonAssetResponse);
    rpc UpdateLessonAsset(UpdateLessonAssetRequest) returns (UpdateLessonAssetResponse);
    rpc DeleteLessonAsset(DeleteLessonAssetRequest) returns (DeleteLessonAssetResponse);
    rpc CreateQuiz(CreateQuizRequest) returns (CreateQuizResponse);
    rpc CreateQuestionAndOption(CreateQuestionAndOptionRequest) returns (CreateQuestionAndOptionResponse);
    rpc FetchCourses(FetchCoursesRequest) returns (FetchCoursesResponse);
    rpc FetchModuleContent(FetchModuleContentRequest) returns (FetchModuleContentResponse);
    rpc FetchLessonContent(FetchLessonContentRequest) returns (FetchLessonContentResponse);
    rpc FetchCourseDetails(FetchCourseDetailsRequest) returns (FetchCourseDetailsResponse);
    rpc FetchQuizQuestions(FetchQuizQuestionsRequest) returns (FetchQuizQuestionsResponse);
    rpc FetchLessonQuizIds(FetchLessonQuizIdsRequest) returns (FetchLessonQuizIdsResponse);
    rpc FetchCourseInformation(FetchCourseInformationRequest) returns (FetchCourseInformationResponse);
    rpc FetchCourseRatings(InstructorFetchCourseRatingsRequest) returns (InstructorFetchCourseRatingsResponse);
    rpc FetchDashboardSummary(FetchDashboardSummaryRequest) returns (FetchDashboardSummaryResponse);
    rpc FetchCourseManagementSummary(FetchCourseManagementSummaryRequest) returns (FetchCourseManagementSummaryResponse);
    rpc FetchRecentActivity(FetchRecentActivityRequest) returns (FetchRecentActivityResponse);
    rpc SearchRecentActivity(SearchRecentActivityRequest) returns (FetchRecentActivityResponse);
    rpc FetchSalesTimeseries(FetchSalesTimeseriesRequest) returns (FetchSalesTimeseriesResponse);
    rpc FetchCourseLearners(FetchCourseLearnersRequest) returns (FetchCourseLearnersResponse);
    rpc FetchCourseAnalyticsSummary(FetchCourseAnalyticsSummaryRequest) returns (FetchCourseAnalyticsSummaryResponse);
    rpc FetchQuizCompletion(FetchQuizCompletionRequest) returns (FetchQuizCompletionResponse);
    rpc FetchCourseRatingsForDashboard(FetchCourseRatingsForDashboardRequest) returns (FetchCourseRatingsForDashboardResponse);
    rpc FetchModuleDropOff(FetchModuleDropOffRequest) returns (FetchModuleDropOffResponse);
    rpc FetchLearnersActivity(FetchLearnersActivityRequest) returns (FetchLearnersActivityResponse);
    rpc FetchPerformanceTrends(FetchPerformanceTrendsRequest) returns (FetchPerformanceTrendsResponse);
}

// Enums
enum CourseStatusGrpc {
    COURSE_STATUS_UNSPECIFIED = 0;
    DRAFT = 1;
    PUBLISHED = 2;
    IN_REVIEW = 3;
}

enum LessonContentTypeGrpc {
    LESSON_CONTENT_TYPE_UNSPECIFIED = 0;
    VIDEO = 1;
    TEXT = 2;
    PDF = 3;
    INTERACTIVE = 4;
    SCORM = 5;
}

enum LessonAssetTypeGrpc {
    LESSON_ASSET_TYPE_UNSPECIFIED = 0;
    VIDEO_URL = 1;
    PDF_URL = 2;
    HTML = 3;
    SCORM_PKG = 4;
    IMAGE_URL = 5;
}

enum QuestionTypeGrpc {
  MULTI_CHOICE = 0;
  TRUE_FALSE = 1;
}

// Course Messages
message CreateCourseRequest {
    string title = 1;
    string coverImageUrl = 2;
    string description = 3;
    string summary = 4;
    repeated string tags = 5;
    repeated string requirements = 6;
    string price = 7;
    string currency = 8;
    repeated CourseProposedAchievementGrpc proposedAchievements = 9;
    string status = 10;
}

message CreateCourseResponse {
    string responseCode = 1;
    string responseMessage = 2;
    CourseDataGrpc responseData = 3;
}

// Update Course Messages
message UpdateInstructorCourseRequest {
    string courseId = 1;
    string title = 2;
    string coverImageUrl = 3;
    string description = 4;
    string summary = 5;
    repeated string tags = 6;
    repeated CourseProposedAchievementGrpc proposedAchievements = 7;
    repeated string requirements = 8;
    string price = 9;
    string currency = 10;
    string level = 11;
    string language = 12;
    int32 estimatedMinutes = 13;
    int32 priceCents = 14;
    bool free = 15;
}

message UpdateInstructorCourseResponse {
    string responseCode = 1;
    string responseMessage = 2;
    CourseDataGrpc responseData = 3;
}

message CourseProposedAchievementGrpc {
    int32 position = 1;
    string description = 2;
}

message CourseDataGrpc {
    string id = 1;
    string coverImageUrl = 2;
    string description = 3;
    string price = 4;
    string currency = 5;
    string title = 6;
    string slug = 7;
    string summary = 8;
    string level = 9;
    string language = 10;
    string status = 11;
    int32 estimatedMinutes = 12;
    int32 priceCents = 13;
    bool free = 14;
    repeated string tags = 15;
    repeated string requirements = 16;
    repeated CourseProposedAchievementGrpc learningOutcomes = 17;
    string lastUpdated = 18;
}

// Module Messages
message CreateModuleRequest {
    string courseId = 1;
    string title = 2;
    string summary = 3;
    int32 position = 4;
}

message CreateModuleResponse {
    string responseCode = 1;
    string responseMessage = 2;
    InstructorModuleDataGrpc responseData = 3;
}

// Update Module Messages
message UpdateModuleRequest {
    string moduleId = 1;
    string title = 2;
    string summary = 3;
    int32 position = 4;
}

message UpdateModuleResponse {
    string responseCode = 1;
    string responseMessage = 2;
    InstructorModuleDataGrpc responseData = 3;
}

message InstructorModuleDataGrpc {
    string id = 1;
    string courseVersionId = 2;
    string courseId = 3;
    string title = 4;
    string summary = 5;
    int32 position = 6;
}

// Lesson Messages
message CreateLessonRequest {
    string courseId = 1;
    string moduleId = 2;
    string title = 3;
    int32 position = 4;
}

message CreateLessonResponse {
    string responseCode = 1;
    string responseMessage = 2;
    LessonData responseData = 3;
}

// Update Lesson Messages
message UpdateLessonRequest {
    string lessonId = 1;
    string courseId = 2;
    string moduleId = 3;
    string title = 4;
    int32 position = 5;
}

message UpdateLessonResponse {
    string responseCode = 1;
    string responseMessage = 2;
    LessonData responseData = 3;
}

message LessonData {
    string id = 1;
    string moduleId = 2;
    string courseVersionId = 3;
    string title = 4;
    string content = 5;
    string contentType = 6;
    int32 durationSeconds = 7;
    int32 position = 8;
    bool isPublished = 9;
    repeated string quizIds = 10;
}

// Lesson Content Messages
message CreateLessonContentRequest {
    string lessonId = 1;
    string title = 2;
    string description = 3;
    string contentType = 4;
    int32 courseVersion = 5;
}

message CreateLessonContentResponse {
    string responseCode = 1;
    string responseMessage = 2;
    CreateLessonContentDataGrpc responseData = 3;
}

// Update Lesson Content Messages
message UpdateLessonContentRequest {
    string lessonContentId = 1;
    string title = 2;
    string description = 3;
    string contentType = 4;
    int32 courseVersion = 5;
}

message UpdateLessonContentResponse {
    string responseCode = 1;
    string responseMessage = 2;
    CreateLessonContentDataGrpc responseData = 3;
}

message CreateLessonContentDataGrpc {
    string id = 1;
    string lessonId = 2;
    string title = 3;
    string description = 4;
    string contentType = 5;
    int32 courseVersion = 6;
}

// Delete Lesson Content Messages
message DeleteLessonContentRequest {
    string lessonContentId = 1;
}

message DeleteLessonContentResponse {
    string responseCode = 1;
    string responseMessage = 2;
    CreateLessonContentDataGrpc responseData = 3;
}

// Lesson Asset Messages
message CreateLessonAssetRequest {
    string lessonContentId = 1;
    string assetType = 2;
    string uri = 3;
    string lessonText = 4;
    string checksum = 5;
    int64 fileSizeBytes = 6;
    string mimeType = 7;
    int32 assetOrder = 8;
}

message CreateLessonAssetResponse {
    string responseCode = 1;
    string responseMessage = 2;
    LessonAssetData responseData = 3;
}

// Update Lesson Asset Messages
message UpdateLessonAssetRequest {
    string lessonAssetId = 1;
    string lessonContentId = 2;
    string assetType = 3;
    string uri = 4;
    string lessonText = 5;
    string checksum = 6;
    int64 fileSizeBytes = 7;
    string mimeType = 8;
    int32 assetOrder = 9;
}

message UpdateLessonAssetResponse {
    string responseCode = 1;
    string responseMessage = 2;
    LessonAssetData responseData = 3;
}

message LessonAssetData {
    string id = 1;
    string lessonContentId = 2;
    string assetType = 3;
    string uri = 4;
    string lessonText = 5;
    string checksum = 6;
    int64 fileSizeBytes = 7;
    string mimeType = 8;
    int32 assetOrder = 9;
}

// Delete Lesson Asset Messages
message DeleteCourseRequest {
    string courseId = 1;
}

message DeleteCourseResponse {
    string responseCode = 1;
    string responseMessage = 2;
    CourseDataGrpc responseData = 3;
}

// Publish Course Messages
message PublishCourseRequest {
    string courseId = 1;
}

message PublishCourseResponse {
    string responseCode = 1;
    string responseMessage = 2;
    CourseDataGrpc responseData = 3;
}

message DeleteModuleRequest {
    string moduleId = 1;
}

message DeleteModuleResponse {
    string responseCode = 1;
    string responseMessage = 2;
    InstructorModuleDataGrpc responseData = 3;
}

message DeleteLessonRequest {
    string lessonId = 1;
}

message DeleteLessonResponse {
    string responseCode = 1;
    string responseMessage = 2;
    LessonDetailsDataGrpc responseData = 3;
}

message DeleteLessonAssetRequest {
    string lessonAssetId = 1;
    string lessonContentId = 2;
}

message DeleteLessonAssetResponse {
    string responseCode = 1;
    string responseMessage = 2;
    LessonAssetData responseData = 3;
}

message CreateQuizRequest {
    string courseId = 1;
    string moduleId = 2;
    string lessonId = 3;
    string title = 4;
}

message CreateQuestionAndOptionRequest{
   string quizId = 1;
   string type = 2;
   string text = 3;
   string explanation = 4;
   int32 difficultyLevel = 5;
   int64 points = 6;
   google.protobuf.Struct metaData = 7;
   repeated QuestionOptionRequestPayloadGrpc options = 8;
}


message QuestionOptionRequestPayloadGrpc {
    string label = 1;
    string text = 2;
    bool isCorrect = 3;
    string feedback = 4;
    int32 position = 5;
}

message CreateQuizResponse {
  string responseCode = 1;
  string responseMessage = 2;
  CreateQuizResponseData responseData = 3;
}

message CreateQuizResponseData {
   string id = 1;
   string quizId = 2;
   string orgId = 3;
   string courseId = 4;
   string moduleId = 5;
   string lessonId = 6;
   string title = 7;
   string description = 8;
   int32 attemptLimit = 9;
   int32 timeLimitMinutes = 10;
   string gradingMethod = 11;
   string visibility = 12;
   int64 passScore =  13;
   bool randomizeItems = 14;
   string createdBy = 15;
   string updatedBy = 16;
}

message CreateQuestionAndOptionResponse {
  string responseCode = 1;
  string responseMessage = 2;
  CreateQuestionAndOptionResponseData responseData = 3;
}


message CreateQuestionAndOptionResponseData {
   string quizId = 1;
   string type = 2;
   string text = 3;
   string explanation = 4;
   int32 difficultyLevel = 5;
   int32 points = 6;
   google.protobuf.Struct metaData = 7;
}

// Fetch Lesson Content Messages
message FetchLessonContentRequest {
    string lessonId = 1;
}

message FetchLessonContentResponse {
    string responseCode = 1;
    string responseMessage = 2;
    LessonContentDataGrpc responseData = 3;
}

message LessonContentDataGrpc {
    LessonData lessonData = 1;
    repeated LessonContentWithAssetsDataGrpc lessonContents = 2;
}

message LessonContentWithAssetsDataGrpc {
    string id = 1;
    string lessonId = 2;
    string title = 3;
    string description = 4;
    string contentType = 5;
    int32 courseVersion = 6;
    repeated LessonAssetData assets = 7;
}

// Fetch Course Details Messages
message FetchCourseDetailsRequest {
    string courseId = 1;
}

message FetchCourseDetailsResponse {
    string responseCode = 1;
    string responseMessage = 2;
    CourseContentDataGrpc responseData = 3;
}

message CourseContentDataGrpc {
    repeated ModuleContentDataGrpc moduleContentData = 1;
}

message ModuleContentDataGrpc {
    string moduleId = 1;
    string moduleTitle = 2;
    string moduleSummary = 3;
    int32 modulePosition = 4;
    repeated LessonDetailsDataGrpc lessonDetailsData = 5;
}

message LessonDetailsDataGrpc {
    string lessonId = 1;
    string lessonTitle = 2;
    int32 position = 3;
    QuizContentDataGrpc quizContentData = 4;
}

// Fetch Courses Messages
message FetchCoursesRequest {
    int32 pageNumber = 1; // Page number (0-based)
    int32 pageSize = 2;   // Number of items per page
    string sort = 3;      // Sort direction
    string status = 4;    // Course status filter (DRAFT, IN_REVIEW, PUBLISHED)
}

message FetchCoursesResponse {
    string responseCode = 1;
    string responseMessage = 2;
    FetchCoursesDataGrpc responseData = 3;
}

message FetchCoursesDataGrpc {
    PaginationMetaGrpc meta = 1;
    repeated CourseDataGrpc content = 2;
}

// Fetch Module Content Messages
message FetchModuleContentRequest {
    string moduleId = 1;
}

message FetchModuleContentResponse {
    string responseCode = 1;
    string responseMessage = 2;
    ModuleContentDataGrpc responseData = 3;
}

message QuizContentDataGrpc {
    string quizId = 1;
    string quizTitle = 2;
}

// Fetch Quiz Questions Messages
message FetchQuizQuestionsRequest {
    string lessonId = 1;
}

message FetchQuizQuestionsResponse {
    string responseCode = 1;
    string responseMessage = 2;
    QuizQuestionsDataGrpc responseData = 3;
}

message QuizQuestionsDataGrpc {
    string lessonId = 1;
    repeated QuizQuestionsSectionGrpc quizSections = 2;
}

message QuizQuestionsSectionGrpc {
    string quizId = 1;
    string quizTitle = 2;
    repeated QuestionWithOptionsDataGrpc questions = 3;
}

message QuestionWithOptionsDataGrpc {
    string questionId = 1;
    string type = 2;
    string text = 3;
    string explanation = 4;
    int32 difficultyLevel = 5;
    int64 points = 6;
    google.protobuf.Struct metaData = 7;
    repeated QuestionOptionDataGrpc options = 8;
}

message QuestionOptionDataGrpc {
    string optionId = 1;
    string label = 2;
    string text = 3;
    bool isCorrect = 4;
    string feedback = 5;
    int32 position = 6;
}

// Fetch Lesson Quiz IDs Messages
message FetchLessonQuizIdsRequest {
    string lessonId = 1;
}

message FetchLessonQuizIdsResponse {
    string responseCode = 1;
    string responseMessage = 2;
    LessonQuizIdsDataGrpc responseData = 3;
}

message LessonQuizIdsDataGrpc {
    string lessonId = 1;
    repeated QuizInfoDataGrpc quizzes = 2;
}

message QuizInfoDataGrpc {
    string quizId = 1;
    string quizName = 2;
    int32 numberOfQuestions = 3;
}

// Fetch Course Information Messages
message FetchCourseInformationRequest {
    string courseId = 1; // Course UUID
}

message FetchCourseInformationResponse {
    string responseCode = 1;
    string responseMessage = 2;
    CourseDataGrpc responseData = 3;
}

// Fetch Course Ratings Messages
message InstructorFetchCourseRatingsRequest {
    string courseId = 1; // Course UUID
    int32 pageNumber = 2;
    int32 pageSize = 3;
    string sort = 4; // "ASC" or "DESC"
}

message InstructorFetchCourseRatingsResponse {
    string responseCode = 1;
    string responseMessage = 2;
    CourseRatingsAndReviewsDataGrpc responseData = 3;
}

message CourseRatingsAndReviewsDataGrpc {
    double rating = 1; // Overall average rating
    int64 reviewCount = 2; // Total number of reviews
    repeated RatingDistributionItemGrpc ratingDistribution = 3;
    repeated ReviewDataGrpc reviews = 4;
    PaginationMetaGrpc meta = 5;
}

message RatingDistributionItemGrpc {
    int32 stars = 1;
    double percentage = 2;
}

message ReviewDataGrpc {
    string id = 1;
    string learnerId = 2;
    string learnerName = 3;
    string avatarUrl = 4;
    string createdAt = 5;
    int32 rating = 6;
    string comment = 7;
}

message RatingDataGrpc {
    string learnerId = 1;
    string learnerName = 2;
    string learnerAvatarUrl = 3;
    string courseId = 4;
    string courseTitle = 5;
    int32 rating = 6;
    string createdAt = 7;
}

message InstructorCourseReviewDataGrpc {
    string id = 1;
    string userId = 2;
    string userName = 3;
    int32 rating = 4;
    string review = 5;
    string ratedAt = 6;
    string updatedAt = 7;
}

message RatingDistributionDataGrpc {
    int64 oneStar = 1;
    int64 twoStar = 2;
    int64 threeStar = 3;
    int64 fourStar = 4;
    int64 fiveStar = 5;
}

// Dashboard Summary Messages
message FetchDashboardSummaryRequest {
    string timeframe = 1; // "12m", "30d", "7d", "24h" - default: "30d"
}

message FetchDashboardSummaryResponse {
    string responseCode = 1;
    string responseMessage = 2;
    DashboardSummaryDataGrpc responseData = 3;
}

message DashboardSummaryDataGrpc {
    string timeframe = 1;
    MetricDataGrpc totalCourses = 2;
    MetricDataGrpc totalLearners = 3;
    RevenueMetricDataGrpc totalRevenue = 4;
    MetricDataGrpc averageRating = 5;
}

message MetricDataGrpc {
    int64 value = 1;
    string formattedValue = 2;
    double percentChange = 3;
    bool isPositive = 4;
}

message RevenueMetricDataGrpc {
    int64 value = 1;
    int32 valueScale = 2;
    string formattedValue = 3;
    double percentChange = 4;
    bool isPositive = 5;
    string currency = 6;
}

// Course Management Summary Messages
message FetchCourseManagementSummaryRequest {
    string timeframe = 1; // "12m", "30d", "7d", "24h" - default: "30d"
}

message FetchCourseManagementSummaryResponse {
    string responseCode = 1;
    string responseMessage = 2;
    CourseManagementSummaryDataGrpc responseData = 3;
}

message CourseManagementSummaryDataGrpc {
    string timeframe = 1;
    MetricDataGrpc myCourses = 2;
    MetricDataGrpc totalLearners = 3;
    MetricDataGrpc totalRatings = 4;
    MetricDataGrpc totalDrafts = 5;
}

// Recent Activity Messages
message FetchRecentActivityRequest {
    int32 pageNumber = 1; // Page index (0-based). Default: 0
    int32 pageSize = 2; // Page size. Default: 20
    string sort = 3; // "ASC" | "DESC". Default: "DESC"
}

message FetchRecentActivityResponse {
    string responseCode = 1;
    string responseMessage = 2;
    RecentActivityDataGrpc responseData = 3;
}

message RecentActivityDataGrpc {
    PaginationMetaGrpc meta = 1;
    repeated RecentActivityItemGrpc records = 2;
}

message RecentActivityItemGrpc {
    string userId = 1;
    string learnerName = 2;
    string learnerAvatarUrl = 3;
    string email = 4;
    string courseTitle = 5;
    string occurredAt = 6;
    string action = 7;
}

// Search Recent Activity Messages
message SearchRecentActivityRequest {
    int32 pageNumber = 1; // Page index (0-based). Default: 0
    int32 pageSize = 2; // Page size. Default: 20
    string sort = 3; // "ASC" | "DESC". Default: "DESC"
    string email = 4; // Optional - filter by user email
    string name = 5; // Optional - filter by user name
    string action = 6; // Optional - filter by action
    string courseTitle = 7; // Optional - filter by course title
    string date = 8; // Optional - filter from date to now (ISO 8601)
}

// Module Drop-Off Messages
message FetchModuleDropOffRequest {
    string courseId = 1;
    string timeframe = 2; // "12m", "30d", "7d", "24h" - default: "30d"
}

message ModuleDropOffItemGrpc {
    string moduleId = 1;
    string moduleTitle = 2;
    int64 learnersCount = 3;
}

message FetchModuleDropOffResponse {
    string responseCode = 1;
    string responseMessage = 2;
    repeated ModuleDropOffItemGrpc responseData = 3;
}

// Learners Activity Messages
message FetchLearnersActivityRequest {
    string timeframe = 1; // "12m" | "30d" | "7d" | "24h"
}

message LearnersActivityPointGrpc {
    string label = 1;
    int64 activeLearners = 2;
    int64 totalLearners = 3;
}

message FetchLearnersActivityResponse {
    string responseCode = 1;
    string responseMessage = 2;
    string timeframe = 3;
    repeated LearnersActivityPointGrpc points = 4;
}

// Performance Trends Messages
message FetchPerformanceTrendsRequest {
    string timeframe = 1; // "12m" | "30d" | "7d" | "24h"
}

message PerformanceTrendsPointGrpc {
    string label = 1;
    string revenueGenerated = 2; // BigDecimal serialized as string
    double courseCompletionRate = 3;
}

message FetchPerformanceTrendsResponse {
    string responseCode = 1;
    string responseMessage = 2;
    string timeframe = 3;
    string currency = 4;
    repeated PerformanceTrendsPointGrpc points = 5;
    int32 valueScale = 6;
}

// Sales Timeseries Messages
message FetchSalesTimeseriesRequest {
    string timeframe = 1; // "12m", "30d", "7d", "24h" - default: "30d"
}

message FetchSalesTimeseriesResponse {
    string responseCode = 1;
    string responseMessage = 2;
    SalesTimeseriesDataGrpc responseData = 3;
}

message SalesTimeseriesDataGrpc {
    string timeframe = 1;
    string currency = 2;
    int32 valueScale = 3;
    repeated TimeseriesPointGrpc points = 4;
}

message TimeseriesPointGrpc {
    string label = 1;
    int64 value = 2;
}

message FetchCourseAnalyticsSummaryRequest {
    string courseId = 1;
    string timeframe = 2; // "12m", "30d", "7d", "24h" - default: "30d"
}

message FetchCourseAnalyticsSummaryResponse {
    string responseCode = 1;
    string responseMessage = 2;
    CourseAnalyticsSummaryDataGrpc responseData = 3;
}

message CourseAnalyticsSummaryDataGrpc {
    string timeframe = 1;
    MetricDataGrpc totalLearners = 2;
    MetricDataGrpc averageRating = 3;
    MetricDataGrpc activeLearners = 4;
}

message FetchQuizCompletionRequest {
    string courseId = 1;
    string timeframe = 2; // "12m", "30d", "7d", "24h" - default: "30d"
}

message QuizCompletionItemGrpc {
    string quizId = 1;
    string quizTitle = 2;
    int64 activeLearners = 3;
    int64 totalLearners = 4;
}

message FetchQuizCompletionResponse {
    string responseCode = 1;
    string responseMessage = 2;
    repeated QuizCompletionItemGrpc responseData = 3;
}

message FetchCourseLearnersRequest {
    string courseId = 1;
    int32 pageNumber = 2;
    int32 pageSize = 3;
    string sort = 4; // "ASC" or "DESC"
}

message FetchCourseLearnersResponse {
    string responseCode = 1;
    string responseMessage = 2;
    CourseLearnersDataGrpc responseData = 3;
}

message CourseLearnersDataGrpc {
    PaginationMetaGrpc meta = 1;
    repeated LearnerDataGrpc records = 2;
}

message LearnerDataGrpc {
    string learnerId = 1;
    string learnerName = 2;
    string learnerAvatarUrl = 3;
    string courseId = 4;
    string courseTitle = 5;
    int32 completionPercent = 6;
    string dateEnrolled = 7;
}

// Course Ratings For Dashboard Messages
message FetchCourseRatingsForDashboardRequest {
    string courseId = 1; // Optional - empty/null means all courses
    int32 pageNumber = 2;
    int32 pageSize = 3;
    string sort = 4; // "ASC" or "DESC"
}

message FetchCourseRatingsForDashboardResponse {
    string responseCode = 1;
    string responseMessage = 2;
    CourseRatingsForDashboardDataGrpc responseData = 3;
}

message CourseRatingsForDashboardDataGrpc {
    PaginationMetaGrpc meta = 1;
    repeated RatingDataGrpc records = 2;
}
