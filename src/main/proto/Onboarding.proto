syntax = "proto3";
option java_multiple_files = true;
option java_package = "com.ocean.afefe.entities.proto";
option java_outer_classname = "OnboardingProto";
import "Common.proto";

service OnboardingAuthServiceGrpc{
   rpc RegisterIndividualUser(IamIndividualRegistrationRequest) returns (IamIndividualRegistrationResponse);
   rpc RegisterInstructor(IamInstructorRegistrationRequest) returns (IamInstructorRegistrationResponse);
   rpc HrOnboardingRegister(IamHrRegistrationRequest) returns (IamHrRegistrationResponse);
   rpc RegisterTrainee(IamTraineeRegistrationRequest) returns (IamTraineeRegistrationResponse);
}

message IamIndividualRegistrationRequest{
  string emailAddress = 1;
  string password = 2;
  string fullName = 3;
  string securityCode = 4;
}

message IamIndividualRegistrationResponse{
  string responseCode = 1;
  string responseMessage = 2;
  IamUserProfileData responseData = 3;
}

message IamInstructorRegistrationRequest{
  string emailAddress = 1;
  string password = 2;
  string fullName = 3;
  string securityCode = 4;
  string biography = 5;
  string websiteUrl = 6;
}

message IamInstructorRegistrationResponse{
  string responseCode = 1;
  string responseMessage = 2;
  IamUserProfileData responseData = 3;
}

message IamTraineeRegistrationRequest{
  string emailAddress = 1;
  string password = 2;
  string fullName = 3;
  string securityCode = 4;
  string biography = 5;
  string websiteUrl = 6;
}

message IamTraineeRegistrationResponse{
  string responseCode = 1;
  string responseMessage = 2;
  IamUserProfileData responseData = 3;
}

message IamHrRegistrationRequest{
  string emailAddress = 1;
  string password = 2;
  string fullName = 3;
  string securityCode = 4;
  string department = 5;
  string employeeCode = 6;
  string jobTitle = 7;
}

message IamHrRegistrationResponse{
  string responseCode = 1;
  string responseMessage = 2;
  IamUserProfileData responseData = 3;
}
