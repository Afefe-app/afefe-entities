syntax = "proto3";
option java_multiple_files = true;
option java_package = "com.ocean.afefe.entities.proto";
option java_outer_classname = "TraineeTrainingProto";
import "Common.proto";
import "Course.proto";

// gRPC API for afefe-trainee programme trainings (catalogue + /me progress).
// Identity and tenant context come from gRPC metadata (same as REST).

service TraineeTrainingServiceGrpc {

  rpc SearchTrainings(SearchTrainingsRequest) returns (SearchTrainingsResponse);
  rpc FetchRecommendedTrainings(FetchRecommendedTrainingsRequest) returns (FetchRecommendedTrainingsResponse);
  rpc FetchRecentlyViewedTrainings(FetchRecentlyViewedTrainingsRequest) returns (FetchRecentlyViewedTrainingsResponse);
  rpc RecordTrainingView(RecordTrainingViewRequest) returns (RecordTrainingViewResponse);

  rpc FetchTrainingOverview(FetchTrainingOverviewRequest) returns (FetchTrainingOverviewResponse);
  rpc FetchTrainingCurriculum(FetchTrainingCurriculumRequest) returns (FetchTrainingCurriculumResponse);
  rpc FetchTrainingContentItem(FetchTrainingContentItemRequest) returns (FetchTrainingContentItemResponse);
  rpc FetchTrainingRatings(FetchTrainingRatingsRequest) returns (FetchTrainingRatingsResponse);
  rpc SubmitTrainingRating(SubmitTrainingRatingRequest) returns (SubmitTrainingRatingResponse);
  rpc EnrollTraining(EnrollTrainingRequest) returns (EnrollTrainingResponse);
  rpc FetchQuizForAttempt(FetchQuizForAttemptRequest) returns (FetchQuizForAttemptResponse);

  rpc FetchMyEnrollments(FetchMyEnrollmentsRequest) returns (FetchMyEnrollmentsResponse);
  rpc FetchEnrollmentGrades(FetchEnrollmentGradesRequest) returns (FetchEnrollmentGradesResponse);

  rpc SaveTrainingContentNote(SaveTrainingContentNoteRequest) returns (SaveTrainingContentNoteResponse);
  rpc UpdateTrainingContentNote(UpdateTrainingContentNoteRequest) returns (UpdateTrainingContentNoteResponse);
  rpc DeleteTrainingContentNote(DeleteTrainingContentNoteRequest) returns (DeleteTrainingContentNoteResponse);
  rpc FetchTrainingContentNoteById(FetchTrainingContentNoteByIdRequest) returns (FetchTrainingContentNoteByIdResponse);
  rpc FetchTrainingContentNotes(FetchTrainingContentNotesRequest) returns (FetchTrainingContentNotesResponse);

  rpc UpdateContentItemProgress(UpdateContentItemProgressRequest) returns (UpdateContentItemProgressResponse);
  rpc UpdateBlockProgress(UpdateBlockProgressRequest) returns (UpdateBlockProgressResponse);
  rpc TraineeStartQuizAttempt(TraineeStartQuizAttemptRequest) returns (TraineeStartQuizAttemptResponse);
  rpc SubmitTraineeQuizAttempt(SubmitTraineeQuizAttemptRequest) returns (SubmitTraineeQuizAttemptResponse);

  rpc FetchSavedTrainings(FetchSavedTrainingsRequest) returns (FetchSavedTrainingsResponse);
  rpc SaveTraining(SaveTrainingRequest) returns (SaveTrainingResponse);
  rpc RemoveSavedTraining(RemoveSavedTrainingRequest) returns (RemoveSavedTrainingResponse);

  rpc FetchMyCertificates(FetchMyCertificatesRequest) returns (FetchMyCertificatesResponse);
  rpc FetchCertificateById(FetchCertificateByIdRequest) returns (FetchCertificateByIdResponse);

  rpc FetchTraineeUpcomingCalendarEvents(FetchTraineeUpcomingCalendarEventsRequest)
      returns (FetchTraineeUpcomingCalendarEventsResponse);

  // Attendance (per scheduled class / CalendarEvent)
  rpc FetchAttendanceSessionContext(FetchAttendanceSessionContextRequest) returns (FetchAttendanceSessionContextResponse);
  rpc FetchTrainingAttendanceSessions(FetchTrainingAttendanceSessionsRequest) returns (FetchTrainingAttendanceSessionsResponse);
  rpc MarkTrainingSessionAttendance(MarkTrainingSessionAttendanceRequest) returns (MarkTrainingSessionAttendanceResponse);

  // OJT (trainee self-reported session logs)
  rpc FetchOjtOverview(FetchOjtOverviewRequest) returns (FetchOjtOverviewResponse);
  rpc FetchOjtSessions(FetchOjtSessionsRequest) returns (FetchOjtSessionsResponse);
  rpc FetchOjtSessionById(FetchOjtSessionByIdRequest) returns (FetchOjtSessionByIdResponse);
  rpc CreateOjtSession(CreateOjtSessionRequest) returns (CreateOjtSessionResponse);
  rpc FetchOjtSupervisors(FetchOjtSupervisorsRequest) returns (FetchOjtSupervisorsResponse);
}

// ---- Shared data types ----

message TrainerBasicDataGrpc {
  string trainerName = 1;
  string trainerProfileImage = 2;
}

// Calendar listing (upcoming DEFAULT-type events). Organizer is the user who created the event.
message TraineeCalendarEventDataGrpc {
  string eventId = 1;
  string coverPhoto = 2;
  string date = 3;
  string startTime = 4;
  string daysLeft = 5;
  string title = 6;
  string description = 7;
  TrainerBasicDataGrpc organizer = 8;
  MoneyGrpc price = 9;
  string eventType = 10;
  bool virtualSession = 11;
  string trainingId = 12;
  string enrollmentId = 13; // UUID when trainee is enrolled; empty otherwise
}

message FetchTraineeUpcomingCalendarEventsRequest {
  int32 pageNumber = 1;
  int32 pageSize = 2;
  string sort = 3;
  /** Optional inclusive lower bound on event date (ISO-8601, e.g. 2026-06-01). */
  string startDate = 4;
  /** Optional inclusive upper bound on event date (ISO-8601). */
  string endDate = 5;
}

message FetchTraineeUpcomingCalendarEventsDataGrpc {
  PaginationMetaGrpc meta = 1;
  repeated TraineeCalendarEventDataGrpc content = 2;
}

message FetchTraineeUpcomingCalendarEventsResponse {
  string responseCode = 1;
  string responseMessage = 2;
  FetchTraineeUpcomingCalendarEventsDataGrpc responseData = 3;
}

message TrainingSummaryDataGrpc {
  string trainingId = 1;
  string coverImageUrl = 2;
  repeated string tags = 3;
  double rating = 4;
  int32 reviews = 5;
  string title = 6;
  string description = 7;
  TrainerBasicDataGrpc trainer = 8;
  MoneyGrpc price = 9;
  bool isSaved = 10;
}

message TrainingSummaryPageDataGrpc {
  PaginationMetaGrpc meta = 1;
  repeated TrainingSummaryDataGrpc content = 2;
}

message TrainingOverviewDataGrpc {
  string trainingId = 1;
  string coverImageUrl = 2;
  string title = 3;
  TrainerBasicDataGrpc trainer = 4;
  repeated CourseProposedAchievementGrpc learningOutcomes = 5;
  repeated string requirements = 6;
  string description = 7;
  optional int32 estimatedMinutes = 8;
  bool hasCertificate = 9;
  string level = 10;
  bool isSaved = 11;
  string enrollmentId = 12; // UUID when trainee is enrolled; empty otherwise
}

message TrainingBlockDataGrpc {
  string blockId = 1;
  string blockType = 2;
  string payloadJson = 3;
  string resourceUrl = 4;
  string traineeQuizId = 5;
  int64 estimatedDurationSeconds = 6;
  string progressStatus = 7;
  optional int32 lastPositionSeconds = 8;
  string lastViewedAt = 9;
  string completedAt = 10;
  string body = 11; // Inline HTML/text for READING blocks (from payloadJson.body)
}

message TrainingContentItemDataGrpc {
  string contentItemId = 1;
  string title = 2;
  string itemFormat = 3;
  optional int32 durationSeconds = 4;
  int32 position = 5;
  optional bool isPublished = 6;
  bool hasQuiz = 7;
  string progressStatus = 8;
  optional int32 progressPercent = 9;
  repeated TrainingBlockDataGrpc blocks = 10;
}

message TrainingWeekDataGrpc {
  string weekId = 1;
  string title = 2;
  int32 position = 3;
  repeated TrainingContentItemDataGrpc contentItems = 4;
  bool hasQuiz = 5;
  string traineeQuizId = 6; // from the week's PRACTICE_QUIZ content item, when present
}

message TrainingMonthDataGrpc {
  string monthId = 1;
  string title = 2;
  int32 position = 3;
  string summary = 4;
  repeated TrainingWeekDataGrpc weeks = 5;
}

message TrainingCurriculumDataGrpc {
  string trainingId = 1;
  string title = 2;
  optional int32 durationMinutes = 3;
  string enrollmentId = 4;
  repeated TrainingMonthDataGrpc months = 5;
}

message TrainingEnrollmentSummaryDataGrpc {
  string enrollmentId = 1;
  string trainingId = 2;
  string trainingTitle = 3;
  string coverImageUrl = 4;
  string status = 5;
  int32 progressPercent = 6;
  string currentMonthId = 7;
  optional int32 currentMonthPosition = 8;
}

message TrainingReviewDataGrpc {
  string ratingId = 1;
  string reviewerName = 2;
  string reviewerProfileImage = 3;
  string reviewDate = 4;
  double rating = 5;
  string review = 6;
}

message FetchTrainingRatingsDataGrpc {
  int64 totalReviewCount = 1;
  double overallRating = 2;
  PaginationMetaGrpc meta = 3;
  repeated TrainingReviewDataGrpc reviews = 4;
}

message SavedTrainingDataGrpc {
  string savedTrainingId = 1;
  TrainingSummaryDataGrpc training = 2;
}

message TrainingCertificateDataGrpc {
  string certificateId = 1;
  string trainingId = 2;
  string trainingTitle = 3;
  string issuedAt = 4;
  string certificateUrl = 5;
}

message TraineeQuizOptionPublicDataGrpc {
  string optionId = 1;
  string label = 2;
  int32 position = 3;
}

message TraineeQuizQuestionPublicDataGrpc {
  string questionId = 1;
  string prompt = 2;
  int32 position = 3;
  repeated TraineeQuizOptionPublicDataGrpc options = 4;
}

message TraineeQuizForAttemptDataGrpc {
  string quizId = 1;
  string title = 2;
  optional int32 attemptLimit = 3;
  repeated TraineeQuizQuestionPublicDataGrpc questions = 4;
}

message TraineeQuizAttemptDataGrpc {
  string attemptId = 1;
  string quizId = 2;
  int32 attemptNumber = 3;
  string attemptStatus = 4;
  optional int32 scorePercent = 5;
}

message FetchRecentlyViewedTrainingsDataGrpc {
  repeated TrainingSummaryDataGrpc content = 1;
}

message FetchMyEnrollmentsDataGrpc {
  repeated TrainingEnrollmentSummaryDataGrpc enrollments = 1;
}

message TrainingGradeRowDataGrpc {
  string quizId = 1;
  string contentItemId = 2;
  string attemptId = 3;
  string itemName = 4;
  string itemTypeLabel = 5;
  string status = 6; // PASSED, PENDING, or FAILED
  string startedAt = 7;
  string submittedAt = 8;
  optional int32 gradePercent = 9;
}

message FetchEnrollmentGradesDataGrpc {
  repeated TrainingGradeRowDataGrpc grades = 1;
}

message TrainingContentNoteDataGrpc {
  string noteId = 1;
  string objectType = 2; // TRAINING, MONTH, WEEK, CONTENT_ITEM, or BLOCK
  string objectId = 3;
  string body = 4;
  string createdAt = 5;
  string assetProgress = 6;
  string assetProgressTime = 7;
}

message SaveTrainingContentNoteRequest {
  string objectType = 1;
  string objectId = 2;
  string body = 3;
  string assetProgress = 4;
  string assetProgressTime = 5;
}

message SaveTrainingContentNoteResponse {
  string responseCode = 1;
  string responseMessage = 2;
  TrainingContentNoteDataGrpc responseData = 3;
}

message UpdateTrainingContentNoteRequest {
  string noteId = 1;
  string body = 2;
  optional string assetProgress = 3;
  optional string assetProgressTime = 4;
}

message UpdateTrainingContentNoteResponse {
  string responseCode = 1;
  string responseMessage = 2;
  TrainingContentNoteDataGrpc responseData = 3;
}

message DeleteTrainingContentNoteRequest {
  string noteId = 1;
}

message DeleteTrainingContentNoteResponse {
  string responseCode = 1;
  string responseMessage = 2;
}

message FetchTrainingContentNoteByIdRequest {
  string noteId = 1;
}

message FetchTrainingContentNoteByIdResponse {
  string responseCode = 1;
  string responseMessage = 2;
  TrainingContentNoteDataGrpc responseData = 3;
}

message FetchTrainingContentNotesRequest {
  int32 pageNumber = 1;
  int32 pageSize = 2;
  string sort = 3;
  string object_id = 4;
}

message FetchTrainingContentNotesResponse {
  string responseCode = 1;
  string responseMessage = 2;
  repeated TrainingContentNoteDataGrpc records = 3;
  PaginationMetaGrpc meta = 4;
}

message FetchSavedTrainingsDataGrpc {
  repeated SavedTrainingDataGrpc content = 1;
}

message FetchMyCertificatesDataGrpc {
  repeated TrainingCertificateDataGrpc certificates = 1;
}

// ---- Search / catalogue ----

message SearchTrainingsRequest {
  string searchKey = 1;
  int32 pageNumber = 2;
  int32 pageSize = 3;
  string sort = 4;
}

message SearchTrainingsResponse {
  string responseCode = 1;
  string responseMessage = 2;
  TrainingSummaryPageDataGrpc responseData = 3;
}

message FetchRecommendedTrainingsRequest {
  int32 pageNumber = 1;
  int32 pageSize = 2;
  string sort = 3;
}

message FetchRecommendedTrainingsResponse {
  string responseCode = 1;
  string responseMessage = 2;
  TrainingSummaryPageDataGrpc responseData = 3;
}

message FetchRecentlyViewedTrainingsRequest {}

message FetchRecentlyViewedTrainingsResponse {
  string responseCode = 1;
  string responseMessage = 2;
  FetchRecentlyViewedTrainingsDataGrpc responseData = 3;
}

message RecordTrainingViewRequest {
  string trainingId = 1;
}

message RecordTrainingViewResponse {
  string responseCode = 1;
  string responseMessage = 2;
  string responseData = 3;
}

message FetchTrainingOverviewRequest {
  string trainingId = 1;
}

message FetchTrainingOverviewResponse {
  string responseCode = 1;
  string responseMessage = 2;
  TrainingOverviewDataGrpc responseData = 3;
}

message FetchTrainingCurriculumRequest {
  string trainingId = 1;
}

message FetchTrainingCurriculumResponse {
  string responseCode = 1;
  string responseMessage = 2;
  TrainingCurriculumDataGrpc responseData = 3;
}

message FetchTrainingContentItemRequest {
  string trainingId = 1;
  string contentItemId = 2;
}

message FetchTrainingContentItemResponse {
  string responseCode = 1;
  string responseMessage = 2;
  TrainingContentItemDataGrpc responseData = 3;
}

message FetchTrainingRatingsRequest {
  string trainingId = 1;
  int32 pageNumber = 2;
  int32 pageSize = 3;
  string sort = 4;
}

message FetchTrainingRatingsResponse {
  string responseCode = 1;
  string responseMessage = 2;
  FetchTrainingRatingsDataGrpc responseData = 3;
}

message SubmitTrainingRatingRequest {
  string trainingId = 1;
  int32 rating = 2;
  string review = 3;
}

message SubmitTrainingRatingResponse {
  string responseCode = 1;
  string responseMessage = 2;
  TrainingReviewDataGrpc responseData = 3;
}

message EnrollTrainingRequest {
  string trainingId = 1;
}

message EnrollTrainingResponse {
  string responseCode = 1;
  string responseMessage = 2;
  TrainingEnrollmentSummaryDataGrpc responseData = 3;
}

message FetchQuizForAttemptRequest {
  string trainingId = 1;
  string quizId = 2;
}

message FetchQuizForAttemptResponse {
  string responseCode = 1;
  string responseMessage = 2;
  TraineeQuizForAttemptDataGrpc responseData = 3;
}

// ---- /me trainings ----

// Optional filter: EnrollmentStatus names (ENROLLED, IN_PROGRESS, COMPLETED, WITHDRAWN). Empty = all statuses.
message FetchMyEnrollmentsRequest {
  repeated string statuses = 1;
}

message FetchMyEnrollmentsResponse {
  string responseCode = 1;
  string responseMessage = 2;
  FetchMyEnrollmentsDataGrpc responseData = 3;
}

message FetchEnrollmentGradesRequest {
  string enrollmentId = 1;
}

message FetchEnrollmentGradesResponse {
  string responseCode = 1;
  string responseMessage = 2;
  FetchEnrollmentGradesDataGrpc responseData = 3;
}

message UpdateContentItemProgressRequest {
  string enrollmentId = 1;
  string contentItemId = 2;
  string progressStatus = 3;
  optional int32 progressPercent = 4;
  string currentBlockId = 5;
}

message UpdateContentItemProgressResponse {
  string responseCode = 1;
  string responseMessage = 2;
  string responseData = 3;
}

message UpdateBlockProgressRequest {
  string enrollmentId = 1;
  string blockId = 2;
  optional int32 lastPositionSeconds = 3;
  optional bool markCompleted = 4;
}

message UpdateBlockProgressResponse {
  string responseCode = 1;
  string responseMessage = 2;
  string responseData = 3;
}

message TraineeStartQuizAttemptRequest {
  string enrollmentId = 1;
  string quizId = 2;
}

message TraineeStartQuizAttemptResponse {
  string responseCode = 1;
  string responseMessage = 2;
  TraineeQuizAttemptDataGrpc responseData = 3;
}

message TraineeQuizAnswerItemGrpc {
  string questionId = 1;
  string selectedOptionId = 2;
}

message SubmitTraineeQuizAttemptRequest {
  string enrollmentId = 1;
  string attemptId = 2;
  repeated TraineeQuizAnswerItemGrpc answers = 3;
}

message SubmitTraineeQuizAttemptResponse {
  string responseCode = 1;
  string responseMessage = 2;
  TraineeQuizAttemptDataGrpc responseData = 3;
}

message FetchSavedTrainingsRequest {}

message FetchSavedTrainingsResponse {
  string responseCode = 1;
  string responseMessage = 2;
  FetchSavedTrainingsDataGrpc responseData = 3;
}

message SaveTrainingRequest {
  string trainingId = 1;
}

message SaveTrainingResponse {
  string responseCode = 1;
  string responseMessage = 2;
  SavedTrainingDataGrpc responseData = 3;
}

message RemoveSavedTrainingRequest {
  string trainingId = 1;
}

message RemoveSavedTrainingResponse {
  string responseCode = 1;
  string responseMessage = 2;
  string responseData = 3;
}

message FetchMyCertificatesRequest {}

message FetchMyCertificatesResponse {
  string responseCode = 1;
  string responseMessage = 2;
  FetchMyCertificatesDataGrpc responseData = 3;
}

message FetchCertificateByIdRequest {
  string certificateId = 1;
}

message FetchCertificateByIdResponse {
  string responseCode = 1;
  string responseMessage = 2;
  TrainingCertificateDataGrpc responseData = 3;
}

// ---- Attendance (per class session) ----

message TraineeAttendanceSessionContextGrpc {
  string calendarEventId = 1;
  string sessionTitle = 2;
  string date = 3;
  string timeRange = 4;
  string timeZoneLabel = 5;
  string location = 6;
  bool virtualSession = 7;
  int32 opensMinutesBefore = 8;
  bool alreadyMarked = 9;
  string markedAt = 10;
  string status = 11;
  bool requiresLiveLocation = 12;
  bool attendanceEnabled = 13;
  bool withinMarkingWindow = 14;
  string windowNotOpenMessage = 15;
}

message FetchAttendanceSessionContextRequest {
  string enrollmentId = 1;
  string calendarEventId = 2;
}

message FetchAttendanceSessionContextResponse {
  string responseCode = 1;
  string responseMessage = 2;
  TraineeAttendanceSessionContextGrpc responseData = 3;
}

message TraineeAttendanceSessionSummaryGrpc {
  string calendarEventId = 1;
  string sessionTitle = 2;
  string sessionDate = 3;
  string status = 4;
  string markedAt = 5;
}

message FetchTrainingAttendanceSessionsDataGrpc {
  PaginationMetaGrpc meta = 1;
  repeated TraineeAttendanceSessionSummaryGrpc content = 2;
}

message FetchTrainingAttendanceSessionsRequest {
  string enrollmentId = 1;
  int32 pageNumber = 2;
  int32 pageSize = 3;
  string sort = 4;
}

message FetchTrainingAttendanceSessionsResponse {
  string responseCode = 1;
  string responseMessage = 2;
  FetchTrainingAttendanceSessionsDataGrpc responseData = 3;
}

message MarkTrainingSessionAttendanceRequest {
  string enrollmentId = 1;
  string calendarEventId = 2;
  string token = 3;
  bool liveLocationUsed = 4;
  optional string latitude = 5;
  optional string longitude = 6;
}

message MarkTrainingSessionAttendanceDataGrpc {
  string calendarEventId = 1;
  string status = 2;
  string markedAt = 3;
}

message MarkTrainingSessionAttendanceResponse {
  string responseCode = 1;
  string responseMessage = 2;
  MarkTrainingSessionAttendanceDataGrpc responseData = 3;
}

// ---- OJT (self-reported session logs) ----

message OjtMilestoneDataGrpc {
  string title = 1;
  string targetDate = 2;
  string status = 3;
  string milestoneType = 4;
}

message OjtOverviewDataGrpc {
  optional int32 daysLeft = 1;
  int64 totalHoursLogged = 2;
  optional int32 minOjtHours = 3;
  repeated OjtMilestoneDataGrpc milestones = 4;
}

message OjtSessionRowDataGrpc {
  string ojtSessionId = 1;
  string sessionId = 2;
  string supervisorName = 3;
  string supervisorAvatarUrl = 4;
  string sessionLocation = 5;
  int32 hoursLogged = 6;
  string sessionDate = 7;
}

message OjtSupportingDocumentGrpc {
  string fileName = 1;
  string fileUrl = 2;
  optional int32 fileSizeBytes = 3;
  string contentType = 4;
}

message OjtSessionDetailDataGrpc {
  string ojtSessionId = 1;
  string sessionId = 2;
  string supervisorUserId = 3;
  string supervisorName = 4;
  string supervisorAvatarUrl = 5;
  string sessionLocation = 6;
  int32 hoursLogged = 7;
  string sessionDate = 8;
  string description = 9;
  bool liveLocationUsed = 10;
  optional string latitude = 11;
  optional string longitude = 12;
  repeated OjtSupportingDocumentGrpc supportingDocuments = 13;
  string createdAt = 14;
}

message OjtSupervisorDataGrpc {
  string userId = 1;
  string fullName = 2;
  string displayName = 3;
  string avatarUrl = 4;
}

message FetchOjtOverviewRequest {
  string enrollmentId = 1;
}

message FetchOjtOverviewResponse {
  string responseCode = 1;
  string responseMessage = 2;
  OjtOverviewDataGrpc responseData = 3;
}

message FetchOjtSessionsDataGrpc {
  PaginationMetaGrpc meta = 1;
  repeated OjtSessionRowDataGrpc content = 2;
}

message FetchOjtSessionsRequest {
  string enrollmentId = 1;
  int32 pageNumber = 2;
  int32 pageSize = 3;
  string sort = 4;
}

message FetchOjtSessionsResponse {
  string responseCode = 1;
  string responseMessage = 2;
  FetchOjtSessionsDataGrpc responseData = 3;
}

message FetchOjtSessionByIdRequest {
  string enrollmentId = 1;
  string ojtSessionId = 2;
}

message FetchOjtSessionByIdResponse {
  string responseCode = 1;
  string responseMessage = 2;
  OjtSessionDetailDataGrpc responseData = 3;
}

message CreateOjtSessionRequest {
  string enrollmentId = 1;
  string sessionLocation = 2;
  string supervisorUserId = 3;
  string supervisorName = 4;
  string sessionDate = 5;
  int32 durationHours = 6;
  string description = 7;
  bool liveLocationUsed = 8;
  optional string latitude = 9;
  optional string longitude = 10;
  repeated OjtSupportingDocumentGrpc supportingDocuments = 11;
}

message CreateOjtSessionResponse {
  string responseCode = 1;
  string responseMessage = 2;
  OjtSessionDetailDataGrpc responseData = 3;
}

message FetchOjtSupervisorsDataGrpc {
  repeated OjtSupervisorDataGrpc supervisors = 1;
}

message FetchOjtSupervisorsRequest {
  string enrollmentId = 1;
}

message FetchOjtSupervisorsResponse {
  string responseCode = 1;
  string responseMessage = 2;
  FetchOjtSupervisorsDataGrpc responseData = 3;
}
